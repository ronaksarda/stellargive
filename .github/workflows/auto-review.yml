name: Auto Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.state == 'open' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Gather PR metadata, diff, and linked issue context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          PR_DATA=$(gh pr view "$PR_NUM" --json title,body,author,files,additions,deletions,changedFiles)
          AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login')
          TITLE=$(echo "$PR_DATA" | jq -r '.title')
          BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
          FILES=$(echo "$PR_DATA" | jq -r '.changedFiles')
          ADDS=$(echo "$PR_DATA" | jq -r '.additions')
          DELS=$(echo "$PR_DATA" | jq -r '.deletions')
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "adds=$ADDS" >> $GITHUB_OUTPUT
          echo "dels=$DELS" >> $GITHUB_OUTPUT
          {
            echo "title<<GHA_DELIM"
            echo "$TITLE"
            echo "GHA_DELIM"
          } >> $GITHUB_OUTPUT
          {
            echo "pr_body<<GHA_DELIM"
            echo "$BODY"
            echo "GHA_DELIM"
          } >> $GITHUB_OUTPUT
          gh pr diff "$PR_NUM" > /tmp/pr-diff.txt 2>/dev/null || true
          DIFF_BYTES=$(wc -c < /tmp/pr-diff.txt | tr -d ' ')
          REAL_CHANGE_LINES=$(grep -E '^[+-]' /tmp/pr-diff.txt | grep -vE '^(\+\+\+|---)' | wc -l | tr -d ' ')
          echo "diff_bytes=$DIFF_BYTES" >> $GITHUB_OUTPUT
          echo "real_change_lines=$REAL_CHANGE_LINES" >> $GITHUB_OUTPUT
          head -3000 /tmp/pr-diff.txt > /tmp/pr-diff-truncated.txt
          ISSUE_NUMS=$(echo "$BODY" | \
            grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
            grep -oE '[0-9]+' | sort -u | tr '\n' ' ' || true)
          : > /tmp/issues-context.txt
          if [ -n "${ISSUE_NUMS:-}" ]; then
            for NUM in $ISSUE_NUMS; do
              ISSUE_DATA=$(gh issue view "$NUM" --repo "${{ github.repository }}" \
                --json number,title,body 2>/dev/null || echo "")
              if [ -n "$ISSUE_DATA" ]; then
                ISSUE_TITLE=$(echo "$ISSUE_DATA" | jq -r '.title // ""')
                ISSUE_BODY=$(echo "$ISSUE_DATA" | jq -r '.body // ""' | head -c 2000)
                {
                  echo "--- Issue #$NUM: $ISSUE_TITLE ---"
                  echo "$ISSUE_BODY"
                  echo ""
                } >> /tmp/issues-context.txt
              fi
            done
          fi
          if [ ! -s /tmp/issues-context.txt ]; then
            echo "(No issues linked or issues could not be fetched)" > /tmp/issues-context.txt
            echo "has_issue=false" >> $GITHUB_OUTPUT
          else
            echo "has_issue=true" >> $GITHUB_OUTPUT
          fi

      - name: Pre-flight empty-diff fraud check
        id: preflight
        env:
          DIFF_BYTES: ${{ steps.ctx.outputs.diff_bytes }}
          REAL_CHANGE_LINES: ${{ steps.ctx.outputs.real_change_lines }}
          ADDS: ${{ steps.ctx.outputs.adds }}
        run: |
          if [ "$DIFF_BYTES" -lt 50 ] || [ "$ADDS" -eq 0 ] || [ "$REAL_CHANGE_LINES" -lt 1 ]; then
            echo "auto_fraud=true" >> $GITHUB_OUTPUT
            echo "fraud_type=empty" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "auto_fraud=false" >> $GITHUB_OUTPUT

      - name: Lenient fraud-detection review (Groq gpt-oss-120b)
        if: steps.preflight.outputs.auto_fraud != 'true'
        id: review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PR_TITLE: ${{ steps.ctx.outputs.title }}
          PR_AUTHOR: ${{ steps.ctx.outputs.author }}
          PR_BODY: ${{ steps.ctx.outputs.pr_body }}
          PR_FILES: ${{ steps.ctx.outputs.files }}
          PR_ADDS: ${{ steps.ctx.outputs.adds }}
          PR_DELS: ${{ steps.ctx.outputs.dels }}
          HAS_ISSUE: ${{ steps.ctx.outputs.has_issue }}
        run: |
          SYSTEM_PROMPT=$(cat <<'SYSTEM_EOF'
          You are an EXTREMELY LENIENT code reviewer for Lernza, a hackathon project.
          Interns are shipping fast. CI has been disabled to maximise velocity.

          ## Default behaviour: APPROVE almost everything

          IGNORE all of: code style, formatting, naming conventions, missing tests,
          untyped code, imperfect patterns, unhandled edge cases, performance,
          accessibility, missing comments, missing documentation, ugly code,
          "not idiomatic" patterns, suggestions for improvement, partial
          implementations, work-in-progress code that compiles.

          A PR with real code changes that plausibly relate to the title or linked
          issue → APPROVE. Do not nitpick. Do not request style fixes. Do not worry
          about quality. Approve.

          Examples that should APPROVE:
          - Bad style but real changes → APPROVE
          - Solves only part of the issue → APPROVE
          - Has typos in code or description → APPROVE
          - Could be done more elegantly → APPROVE
          - Missing tests → APPROVE
          - Wrong-looking but plausible attempt → APPROVE
          - Hardcoded values, magic numbers → APPROVE
          - No error handling → APPROVE

          ## Exception: catch SCAM / FRAUD

          You exist for ONE purpose besides approving: catch contributors who are
          GAMING the contribution credit system without doing real work. Flag fraud
          ONLY when you have concrete evidence in the diff itself.

          Fraud categories (FLAG_FRAUD):

          1. empty: diff is whitespace-only, formatting-only, import-reordering only,
             or comment-only changes passed off as substantive feature work.
          2. unrelated: the diff has no plausible connection to the PR title /
             description / linked issue (e.g. PR titled "fix login bug" but the diff
             only changes a colour or unrelated README section).
          3. ai_slop: obvious AI-generated boilerplate that adds dead code (functions
             never called, types never used, components never rendered, files never
             imported) with no actual problem being solved in the existing codebase.
          4. copy_paste: code copied verbatim from another file in the same repo
             with trivial renames, presenting duplicated logic as new work.
          5. revert_repackage: the diff reverts another contributor's prior commits
             and presents the reverted state as the contributor's own change.
          6. claim_mismatch: PR description claims to implement X (e.g. "adds JWT
             auth") but the diff clearly does NOT implement X (e.g. only edits a
             string literal). The discrepancy must be objectively obvious from the
             diff, not a subjective judgement about completeness.
          7. security: exposed secrets / API keys / private keys / credentials
             hardcoded in the diff, or obviously destructive code (rm -rf $HOME,
             DROP TABLE in production paths, leaking PII to logs).

          ## Critical decision rule

          If you are NOT highly certain that fraud is happening, APPROVE.
          False-positive fraud accusations damage intern morale and trust.
          Only FLAG_FRAUD when the evidence is staring you in the face.

          "Low effort" is NOT fraud. "Could be better" is NOT fraud.
          "Doesn't fully solve the issue" is NOT fraud. "Code smells" is NOT fraud.

          Your confidence on FLAG_FRAUD must reflect this: if you are even slightly
          uncertain, either APPROVE or set FLAG_FRAUD confidence below 0.7.

          ## Output

          Respond with a SINGLE JSON object only. No preamble, no markdown fences,
          no explanation outside the JSON.

          The "summary" field is what gets posted to the PR as your review comment.
          Keep it natural, friendly, and conversational — under 150 words, addressed
          to the contributor. Do NOT include any meta-commentary about confidence,
          fraud type, or that you are an automated reviewer in the summary text.

          Schema:
          {
            "decision": "APPROVE" | "FLAG_FRAUD",
            "confidence": <number between 0 and 1, where 1 = certain>,
            "fraud_type": "none" | "empty" | "unrelated" | "ai_slop" | "copy_paste" | "revert_repackage" | "claim_mismatch" | "security",
            "evidence": <string — for FLAG_FRAUD, cite specific files/lines/patterns from the diff that prove the fraud; for APPROVE, name one real change you observed>,
            "summary": <string under 150 words, friendly tone, addressed to the contributor>
          }
          SYSTEM_EOF
          )

          jq -n \
            --arg system   "$SYSTEM_PROMPT" \
            --arg title    "$PR_TITLE" \
            --arg author   "$PR_AUTHOR" \
            --arg pr_body  "$PR_BODY" \
            --arg files    "$PR_FILES" \
            --arg adds     "$PR_ADDS" \
            --arg dels     "$PR_DELS" \
            --arg has_iss  "$HAS_ISSUE" \
            --rawfile diff /tmp/pr-diff-truncated.txt \
            --rawfile issues /tmp/issues-context.txt \
            '{
              model: "openai/gpt-oss-120b",
              messages: [
                { role: "system", content: $system },
                { role: "user",   content: (
                    "## PR metadata\n\n" +
                    "Title: " + $title + "\n" +
                    "Author: " + $author + "\n" +
                    "Files changed: " + $files + "\n" +
                    "Additions: " + $adds + "\n" +
                    "Deletions: " + $dels + "\n" +
                    "Has linked issue: " + $has_iss + "\n\n" +
                    "## PR description\n\n" + $pr_body + "\n\n" +
                    "## Linked issue(s) full content\n\n" + $issues + "\n\n" +
                    "## Diff (first 3000 lines)\n\n```diff\n" + $diff + "\n```\n\n" +
                    "Now produce the JSON review object."
                ) }
              ],
              max_completion_tokens: 4096,
              temperature: 0.1,
              response_format: { type: "json_object" },
              reasoning_effort: "medium"
            }' > /tmp/payload.json

          RESPONSE=$(curl -s --max-time 180 https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -d @/tmp/payload.json)

          echo "Response top-level keys: $(echo "$RESPONSE" | jq -r 'keys | join(", ")' 2>/dev/null || echo '<unparseable>')"

          API_ERROR=$(echo "$RESPONSE" | jq -r '.error.message // ""' 2>/dev/null || echo "")
          REVIEW_JSON=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // ""' 2>/dev/null || echo "")

          DECISION="UNKNOWN"
          CONFIDENCE="0"
          FRAUD_TYPE="none"
          EVIDENCE=""
          MODEL_SUMMARY=""

          if [ -n "$API_ERROR" ] && [ "$API_ERROR" != "null" ]; then
            echo "Groq API error: $API_ERROR"
            MODEL_SUMMARY="Auto-review failed (API error). Leaving PR for human review."
          elif [ -z "$REVIEW_JSON" ] || [ "$REVIEW_JSON" = "null" ]; then
            echo "Empty model response"
            MODEL_SUMMARY="Auto-review returned an empty response. Leaving PR for human review."
          elif ! echo "$REVIEW_JSON" | jq empty 2>/dev/null; then
            echo "Model output is not valid JSON. Raw: $REVIEW_JSON"
            MODEL_SUMMARY="Auto-review returned malformed output. Leaving PR for human review."
          else
            DECISION=$(echo "$REVIEW_JSON" | jq -r '.decision // "UNKNOWN"')
            CONFIDENCE=$(echo "$REVIEW_JSON" | jq -r '.confidence // 0')
            FRAUD_TYPE=$(echo "$REVIEW_JSON" | jq -r '.fraud_type // "none"')
            EVIDENCE=$(echo "$REVIEW_JSON" | jq -r '.evidence // ""')
            MODEL_SUMMARY=$(echo "$REVIEW_JSON" | jq -r '.summary // ""')

            if [ "$DECISION" != "APPROVE" ] && [ "$DECISION" != "FLAG_FRAUD" ]; then
              echo "Unrecognised decision value: $DECISION — failing closed"
              DECISION="UNKNOWN"
              MODEL_SUMMARY="Auto-review returned an unrecognised decision. Leaving PR for human review."
            fi
          fi

          # Log full details to Actions run output for your debugging.
          # These do NOT get posted to the PR.
          echo "::group::Auto-review details (run-only, not posted)"
          echo "Decision:   $DECISION"
          echo "Confidence: $CONFIDENCE"
          echo "Fraud type: $FRAUD_TYPE"
          echo "Evidence:   $EVIDENCE"
          echo "::endgroup::"

          # The PR comment body is JUST the model summary. Nothing appended.
          if [ -z "$MODEL_SUMMARY" ]; then
            MODEL_SUMMARY="Looks good."
          fi
          REVIEW_BODY="$MODEL_SUMMARY"

          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          echo "confidence=$CONFIDENCE" >> $GITHUB_OUTPUT
          echo "fraud_type=$FRAUD_TYPE" >> $GITHUB_OUTPUT
          {
            echo "body<<REVIEW_EOF"
            echo "$REVIEW_BODY"
            echo "REVIEW_EOF"
          } >> $GITHUB_OUTPUT

      - name: Handle pre-flight detected empty PR (auto-close)
        if: steps.preflight.outputs.auto_fraud == 'true'
        env:
          GH_TOKEN: ${{ secrets.OWNER_PAT }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ steps.ctx.outputs.author }}
        run: |
          PAT_USER=$(gh api user --jq '.login' 2>/dev/null || echo "")
          BODY=$(printf '%s\n' \
            "This PR has an empty or whitespace-only diff — no real code changes detected." \
            "" \
            "If you intended to push code, please commit it. Closing automatically; reopen once you have actual changes.")

          if [ "$PR_AUTHOR" = "$PAT_USER" ]; then
            gh pr comment "$PR_NUM" --body "$BODY"
          else
            gh pr review "$PR_NUM" --request-changes --body "$BODY" || \
              gh pr comment "$PR_NUM" --body "$BODY"
          fi

          gh pr close "$PR_NUM" --comment "Closed: empty diff." || true

      - name: Submit review and act on model decision
        if: steps.preflight.outputs.auto_fraud != 'true'
        id: act
        env:
          GH_TOKEN: ${{ secrets.OWNER_PAT }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ steps.ctx.outputs.author }}
          DECISION: ${{ steps.review.outputs.decision }}
          CONFIDENCE: ${{ steps.review.outputs.confidence }}
          FRAUD_TYPE: ${{ steps.review.outputs.fraud_type }}
          BODY: ${{ steps.review.outputs.body }}
        run: |
          PAT_USER=$(gh api user --jq '.login' 2>/dev/null || echo "")
          IS_SELF_PR="false"
          if [ "$PR_AUTHOR" = "$PAT_USER" ]; then
            IS_SELF_PR="true"
          fi

          MERGE_OK=$(awk -v c="$CONFIDENCE" 'BEGIN { print (c+0 >= 0.7) ? "true" : "false" }')
          CLOSE_OK=$(awk -v c="$CONFIDENCE" 'BEGIN { print (c+0 >= 0.85) ? "true" : "false" }')

          echo "merge_ok=$MERGE_OK" >> $GITHUB_OUTPUT
          echo "close_ok=$CLOSE_OK" >> $GITHUB_OUTPUT

          if [ -z "$BODY" ]; then
            BODY="Looks good."
          fi

          case "$DECISION" in
            APPROVE)
              if [ "$IS_SELF_PR" = "true" ]; then
                gh pr comment "$PR_NUM" --body "$BODY"
              else
                gh pr review "$PR_NUM" --approve --body "$BODY"
              fi
              ;;

            FLAG_FRAUD)
              if [ "$IS_SELF_PR" = "true" ]; then
                gh pr comment "$PR_NUM" --body "$BODY"
              else
                gh pr review "$PR_NUM" --request-changes --body "$BODY"
              fi

              if [ "$CLOSE_OK" = "true" ]; then
                gh pr close "$PR_NUM" --comment "Closed: $FRAUD_TYPE. Reopen with real changes if this was a mistake." || true
              fi
              ;;

            *)
              gh pr comment "$PR_NUM" --body "$BODY"
              ;;
          esac

      - name: Auto-merge approved PRs at high confidence
        if: |
          steps.preflight.outputs.auto_fraud != 'true'
          && steps.review.outputs.decision == 'APPROVE'
          && steps.act.outputs.merge_ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.OWNER_PAT }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ steps.ctx.outputs.title }}
        run: |
          COMMIT_BODY=$(gh pr view "$PR_NUM" --json commits \
            --jq '[.commits[].messageBody] | join("\n")' \
            | grep -viE 'co-authored-by:.*(claude|qwen|copilot|github-actions|bot|\[bot\]|gpt|openai|anthropic)' \
            || true)

          MERGE_BODY=$(printf '%s\n\nCo-authored-by: Dopey <hello@sshdopey.com>' "$COMMIT_BODY" \
            | sed '/^$/N;/^\n$/d')

          gh pr merge "$PR_NUM" \
            --squash \
            --admin \
            --subject "$PR_TITLE" \
            --body "$MERGE_BODY"
