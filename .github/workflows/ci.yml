name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-and-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/stellar-give

      - name: Format check
        working-directory: contracts/stellar-give
        run: cargo fmt --check

      - name: Clippy
        working-directory: contracts/stellar-give
        run: cargo clippy -- -D warnings

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli

      - name: Rust Build
        working-directory: contracts/stellar-give
        run: cargo build --locked --target wasm32-unknown-unknown --release

      - name: Rust Test
        working-directory: contracts/stellar-give
        run: cargo test --locked

      - name: Rust Coverage
        working-directory: contracts/stellar-give
        run: cargo tarpaulin --out Xml

      - name: WASM Optimization Check
        run: bash scripts/build-contract.sh

      - name: Codecov Upload (Rust)
        uses: codecov/codecov-action@v4
        with:
          files: contracts/stellar-give/cobertura.xml
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Next.js and node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            frontend/.next/cache
            frontend/node_modules/.cache
          key: ${{ runner.os }}-next-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Accessibility Check
        working-directory: frontend
        run: npm run test:a11y

      - name: Frontend Test and Coverage
        working-directory: frontend
        run: npm run test -- --coverage

      - name: Codecov Upload (Frontend)
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
